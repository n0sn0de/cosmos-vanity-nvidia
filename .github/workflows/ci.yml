name: CI

on:
  push:
    branches:
      - main
      - master
      - nitro/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: Linux fmt, lint, test, release-build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ocl-icd-opencl-dev clinfo

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --features "opencl cuda" -- -D warnings

      - name: Test workspace (default)
        run: cargo test --workspace

      - name: Test workspace (cuda)
        run: cargo test --workspace --features cuda

      - name: Test workspace (opencl + cuda)
        run: cargo test --workspace --features "opencl cuda"

      - name: Build release binary (linux gpu bundle)
        run: cargo build --release -p cosmos-vanity-cli --features "opencl cuda"

  windows:
    name: Windows build and test
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Test workspace (default)
        run: cargo test --workspace

      - name: Test workspace (cuda)
        run: cargo test --workspace --features cuda

      - name: Build release binary (windows cuda bundle)
        run: cargo build --release -p cosmos-vanity-cli --features cuda
